
workflow:
  rules:
    # Only run the pipeline for semver tags that may include a Debian revision, e.g. v1.0.0 or v1.0.0-1
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-\d+)?$/'
      when: always
    - when: never

validate-tag:
  stage: .pre
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends devscripts
  script:
    - |
      # Strip leading 'v' from the tag
      TAG_VERSION="${CI_COMMIT_TAG#v}"
      # Read the version from the latest debian/changelog entry
      CHANGELOG_VERSION="$(dpkg-parsechangelog -S Version)"
      echo "Tag version:        $TAG_VERSION"
      echo "Changelog version:  $CHANGELOG_VERSION"
      if [ "$TAG_VERSION" != "$CHANGELOG_VERSION" ]; then
        echo "ERROR: Tag version $TAG_VERSION does not match changelog version $CHANGELOG_VERSION"
        exit 1
      fi
      echo "Tag version matches changelog version."

build-deb:
  stage: build
  needs: [validate-tag]
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends build-essential debhelper devscripts
  script:
    - make clean
    - make package
  artifacts:
    paths:
      - deb-build/*.deb
      - deb-build/*.changes
      - deb-build/*.buildinfo
    expire_in: 1 hour

release:
  stage: release_and_publish
  needs: [build-deb]
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends curl
  script:
    - |
      TAG_VERSION="${CI_COMMIT_TAG#v}"
      echo "Uploading generic package for version $TAG_VERSION"
      for file in deb-build/*.deb; do
        filename=$(basename "$file")
        echo "Uploading $filename ..."
        curl --fail --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "$file" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/leios-theme-plasmoids-digitalclock/${TAG_VERSION}/${filename}"
      done

publish:
  stage: release_and_publish
  needs: [build-deb]
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends devscripts
  script:
    - |
      # Strip leading 'v' from the tag
      TAG_VERSION="${CI_COMMIT_TAG#v}"
      CHANGELOG_VERSION="$(dpkg-parsechangelog -S Version)"
      if [ "$TAG_VERSION" != "$CHANGELOG_VERSION" ]; then
        echo "ERROR: Tag version $TAG_VERSION does not match changelog version $CHANGELOG_VERSION"
        exit 1
      fi
      echo "Publishing release $CI_COMMIT_TAG"
